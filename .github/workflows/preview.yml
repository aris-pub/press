name: Preview Deploy

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  APP_NAME: scroll-press-pr-${{ github.event.pull_request.number }}

permissions:
  pull-requests: write

jobs:
  deploy:
    # Skip deploy for dependabot PRs — dependency bumps don't need preview environments
    # and creating fly apps for them generates orphans + cost without value.
    # Let CI run on these PRs; just skip the fly preview.
    if: github.event.action != 'closed' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup Fly CLI
      uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Create preview app and database
      env:
        DB_APP: ${{ env.APP_NAME }}-db
      run: |
        if ! flyctl status --app "$APP_NAME" 2>/dev/null; then
          # Clean up stale DB app from a previous failed run
          if flyctl status --app "$DB_APP" 2>/dev/null; then
            flyctl apps destroy "$DB_APP" --yes
          fi

          # Create ephemeral Postgres for this PR
          flyctl postgres create \
            --name "$DB_APP" \
            --org personal \
            --region fra \
            --vm-size shared-cpu-1x \
            --vm-memory 512 \
            --volume-size 1 \
            --initial-cluster-size 1

          # Create the app
          flyctl apps create "$APP_NAME" --org personal

          # Attach database (sets DATABASE_URL — app normalizes postgres:// at startup)
          flyctl postgres attach "$DB_APP" --app "$APP_NAME"

          flyctl secrets set --app "$APP_NAME" \
            SECRET_KEY="preview-${{ github.event.pull_request.number }}" \
            ENVIRONMENT="preview" \
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            AWS_ENDPOINT_URL_S3="${{ secrets.AWS_ENDPOINT_URL_S3 }}" \
            AWS_REGION="auto" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            BUCKET_NAME="${{ secrets.BUCKET_NAME }}" \
            ORCID_CLIENT_ID="${{ secrets.ORCID_CLIENT_ID }}" \
            ORCID_CLIENT_SECRET="${{ secrets.ORCID_CLIENT_SECRET }}"
        fi

    - name: Deploy preview
      run: |
        flyctl deploy --app "$APP_NAME" \
          --ha=false \
          --yes

    - name: Reset, migrate, and seed database
      run: |
        flyctl ssh console --app "$APP_NAME" \
          -C "uv run --frozen --no-dev python /app/scripts/reset_db.py"
        flyctl ssh console --app "$APP_NAME" \
          -C "uv run --frozen --no-dev alembic upgrade head"
        flyctl ssh console --app "$APP_NAME" \
          -C "uv run --frozen --no-dev python /app/scripts/seed.py"

    - name: Comment preview URL
      uses: actions/github-script@v7
      with:
        script: |
          const appName = process.env.APP_NAME;
          const url = `https://${appName}.fly.dev`;
          const body = `### Deploy Preview\n\n${url}\n\nThis preview will be destroyed when the PR is closed.`;

          // Find existing preview comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes('### Deploy Preview'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

  destroy:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
    - name: Setup Fly CLI
      uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Destroy preview app and database
      run: |
        # Treat "app does not exist" as success (not every closed PR had a deploy);
        # any other failure is reported loudly so orphans don't accumulate silently.
        destroy_app() {
          local app="$1"
          if ! flyctl status --app "$app" >/dev/null 2>&1; then
            echo "App $app does not exist; skipping."
            return 0
          fi
          if ! flyctl apps destroy "$app" --yes; then
            echo "::error title=Destroy failed::Failed to destroy fly app $app — investigate manually with 'flyctl apps destroy $app'"
            return 1
          fi
          echo "Destroyed $app."
        }
        rc=0
        destroy_app "$APP_NAME" || rc=1
        destroy_app "$APP_NAME-db" || rc=1
        exit $rc
