name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: press
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        prune-cache: false
        cache-suffix: v1

    - name: Install dependencies
      run: uv sync

    - name: Install Just
      uses: extractions/setup-just@v1

    - name: Run linting
      run: just lint

    - name: Run unit tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/press
        TESTING: 1
      run: uv run pytest -m "not e2e"

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-unit

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: desktop
            marker: "e2e and desktop"
            browser: ""
            timeout: 240
          - name: mobile-webkit
            marker: "e2e and mobile"
            browser: "--browser webkit"
            timeout: 240
          - name: mobile-chromium
            marker: "e2e and mobile"
            browser: "--browser chromium"
            timeout: 240
          - name: universal
            marker: "e2e and not desktop and not mobile"
            browser: ""
            timeout: 300

    name: e2e (${{ matrix.name }})

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: press
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        prune-cache: false
        cache-suffix: v1

    - name: Install dependencies
      run: uv sync

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('uv.lock') }}

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: uv run playwright install --with-deps

    - name: Install Playwright system deps
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: uv run playwright install-deps

    - name: Run database migrations
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/press
        TESTING: 1
      run: uv run alembic upgrade head

    - name: Seed database
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/press
        TESTING: 1
        PYTHONPATH: .
      run: uv run python scripts/seed.py

    - name: Start server
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/press
        TESTING: 1
        E2E_TESTING: 1
        PYTHONPATH: .
        PORT: 8000
      run: |
        uv run uvicorn main:app --host 0.0.0.0 --port 8000 --log-level info &
        sleep 8
        curl -f http://localhost:8000 || exit 1

    - name: Run e2e tests (${{ matrix.name }})
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/press
        TESTING: 1
      run: |
        timeout ${{ matrix.timeout }} uv run pytest -m "${{ matrix.marker }}" --tb=short -v ${{ matrix.browser }}
